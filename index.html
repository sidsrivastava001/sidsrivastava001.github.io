<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSV Viewer</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --accent: #0f766e;
      --accent-soft: #ccfbf1;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ecfeff 0%, var(--bg) 35%);
    }

    .wrap {
      width: min(1200px, 96vw);
      margin: 2rem auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 1.25rem;
    }

    .controls {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: 1fr;
      margin-bottom: 1rem;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    input[type="search"], button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.5rem 0.65rem;
      font-size: 0.95rem;
      background: #fff;
    }

    button {
      cursor: pointer;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 0.55rem 0.6rem;
      text-align: left;
      vertical-align: top;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f9fafb;
      cursor: pointer;
      user-select: none;
    }

    th:hover {
      background: var(--accent-soft);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    .empty {
      padding: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>CSV Table Viewer</h1>
    <div class="controls">
      <div class="row">
        <button id="reloadCsv" type="button">Reload all_structures.csv</button>
      </div>
      <div class="row">
        <label for="locationSearch">Search Location:</label>
        <input id="locationSearch" type="search" placeholder="Type to filter Location...">
      </div>
      <div id="status" class="hint">Loading all_structures.csv...</div>
      <div class="hint">Click any header to sort ascending/descending.</div>
    </div>

    <div class="table-wrap">
      <table id="dataTable">
        <thead></thead>
        <tbody>
          <tr><td class="empty">Loading all_structures.csv...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const EXPECTED_HEADERS = [
      "Location",
      "Chrom",
      "Start",
      "End",
      "Bulge Counts",
      "Free energy",
      "Average DMS signal",
      "% Nucleotides with DMS signal",
      "Structure SVG",
      "Neighboring Gene"
    ];

    const CSV_PATH = "all_structures.csv";
    const reloadBtn = document.getElementById("reloadCsv");
    const status = document.getElementById("status");
    const searchInput = document.getElementById("locationSearch");
    const table = document.getElementById("dataTable");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");

    let allRows = [];
    let filteredRows = [];
    let sortState = { column: null, direction: "asc" };

    reloadBtn.addEventListener("click", () => {
      loadHardcodedCsv();
    });

    searchInput.addEventListener("input", () => {
      applySearchAndRender();
    });

    loadHardcodedCsv();

    function applySearchAndRender() {
      const query = searchInput.value.trim().toLowerCase();
      filteredRows = allRows.filter(row =>
        row["Location"].toLowerCase().includes(query)
      );

      if (sortState.column) {
        sortRows(sortState.column, sortState.direction, false);
      }

      renderTable();
    }

    async function loadHardcodedCsv() {
      status.textContent = `Loading ${CSV_PATH}...`;
      try {
        const response = await fetch(CSV_PATH, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const text = await response.text();
        const parsed = parseCSV(text);
        if (!parsed.length) {
          throw new Error("CSV file is empty");
        }

        const headers = parsed[0].map(h => h.trim());
        if (!arraysEqual(headers, EXPECTED_HEADERS)) {
          throw new Error("CSV headers do not match expected headers exactly");
        }

        allRows = parsed.slice(1).map(cells => {
          const row = {};
          EXPECTED_HEADERS.forEach((h, i) => {
            row[h] = (cells[i] ?? "").trim();
          });
          return row;
        });

        sortState = { column: null, direction: "asc" };
        applySearchAndRender();
        status.textContent = `Loaded ${allRows.length} rows from ${CSV_PATH}.`;
      } catch (error) {
        allRows = [];
        filteredRows = [];
        renderTable();
        status.textContent = `Could not load ${CSV_PATH}: ${error.message}`;
      }
    }

    function renderTable() {
      thead.innerHTML = "";
      tbody.innerHTML = "";

      const headerRow = document.createElement("tr");
      EXPECTED_HEADERS.forEach((header) => {
        const th = document.createElement("th");
        const arrow = sortState.column === header ? (sortState.direction === "asc" ? " ^" : " v") : "";
        th.textContent = header + arrow;
        th.addEventListener("click", () => {
          const nextDir = sortState.column === header && sortState.direction === "asc" ? "desc" : "asc";
          sortRows(header, nextDir, true);
        });
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);

      if (!filteredRows.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.className = "empty";
        td.colSpan = EXPECTED_HEADERS.length;
        td.textContent = "No matching rows.";
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      filteredRows.forEach((row) => {
        const tr = document.createElement("tr");
        EXPECTED_HEADERS.forEach((header) => {
          const td = document.createElement("td");

          if (header === "Structure SVG") {
            const path = row[header];
            if (path) {
              const a = document.createElement("a");
              a.href = path;
              a.textContent = path;
              td.appendChild(a);
            } else {
              td.textContent = "";
            }
          } else {
            td.textContent = row[header];
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function sortRows(column, direction, rerender) {
      filteredRows.sort((a, b) => compareValues(a[column], b[column], direction));
      sortState = { column, direction };
      if (rerender) renderTable();
    }

    function compareValues(a, b, direction) {
      const numA = Number(a);
      const numB = Number(b);
      const bothNumeric = !Number.isNaN(numA) && !Number.isNaN(numB) && a !== "" && b !== "";

      let result;
      if (bothNumeric) {
        result = numA - numB;
      } else {
        result = a.localeCompare(b, undefined, { numeric: true, sensitivity: "base" });
      }
      return direction === "asc" ? result : -result;
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false;
      }
      return true;
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (ch === "\"") {
          if (inQuotes && next === "\"") {
            cell += "\"";
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((ch === "\n" || ch === "\r") && !inQuotes) {
          if (ch === "\r" && next === "\n") i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }

      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }

      return rows.filter(r => !(r.length === 1 && r[0].trim() === ""));
    }
  </script>
</body>
</html>
